name: Shell tests

on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  shelltests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
      with:
          otp-version: '26.0'
          elixir-version: '1.14'
    - name: Compile
      run: ./bootstrap
    - name: Install
      run: |
        sudo cp ./rebar3 /usr/local/bin/

    - name: Checkout shell tests
      run: git clone https://github.com/tsloughter/rebar3_tests

    - name: Install and run shelltestrunner
      run: |
        sudo apt-get update
        sudo apt-get install -y shelltestrunner build-essential cmake liblz4-dev
        cd rebar3_tests
        mix local.hex --force
        ./run_tests.sh
